<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Export JSON — Jikan API</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080c10;
      --panel: #0d1117;
      --border: #1e2d3d;
      --ok: #00ff88;
      --error: #ff3b5c;
      --warn: #ffb800;
      --accent: #00c9ff;
      --text: #c9d1d9;
      --muted: #4a5568;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
      pointer-events: none;
      z-index: 100;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,201,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,201,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      padding: 18px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(13,17,23,0.95);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .logo span { color: var(--muted); font-weight: 400; }

    .nav { display: flex; gap: 24px; }
    .nav a {
      font-size: 0.7rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav a:hover { color: var(--accent); }

    main {
      position: relative;
      z-index: 10;
      flex: 1;
      max-width: 900px;
      margin: 50px auto;
      padding: 0 24px;
      width: 100%;
    }

    .hero {
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.1s;
    }

    .hero-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2.8rem;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1;
    }

    .hero h1 span { color: var(--accent); }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.2s;
    }

    @media(max-width:600px) { .stats-row { grid-template-columns: 1fr; } }

    .stat {
      padding: 18px 20px;
      border: 1px solid var(--border);
      background: var(--panel);
    }

    .stat-v {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .stat-l {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.25s;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border: 1px solid;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
    }

    .btn-dl {
      border-color: var(--ok);
      color: var(--ok);
    }
    .btn-dl:hover {
      background: rgba(0,255,136,0.1);
      box-shadow: 0 0 20px rgba(0,255,136,0.15);
    }

    .btn-copy {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-copy:hover {
      background: rgba(0,201,255,0.1);
    }

    .btn-refresh {
      border-color: var(--border);
      color: var(--muted);
    }
    .btn-refresh:hover {
      border-color: var(--muted);
      color: var(--text);
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.3s;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .filter-select {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      padding: 6px 12px;
      cursor: pointer;
    }

    .filter-select:focus { outline: 1px solid var(--accent); }

    .search-input {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      padding: 6px 12px;
      flex: 1;
      min-width: 200px;
    }

    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { outline: 1px solid var(--accent); }

    /* JSON viewer */
    .json-panel {
      border: 1px solid var(--border);
      background: #050810;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.35s;
    }

    .json-panel-header {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #080c14;
    }

    .json-panel-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.r { background: #ff5f56; }
    .dot.y { background: #ffbd2e; }
    .dot.g { background: #27c93f; }

    .json-title {
      font-size: 0.7rem;
      color: var(--muted);
      margin-left: 8px;
    }

    .record-count {
      font-size: 0.68rem;
      color: var(--muted);
    }

    .record-count span { color: var(--accent); }

    /* Runs list */
    .runs-list {
      max-height: 500px;
      overflow-y: auto;
    }

    .runs-list::-webkit-scrollbar { width: 4px; }
    .runs-list::-webkit-scrollbar-track { background: transparent; }
    .runs-list::-webkit-scrollbar-thumb { background: var(--border); }

    .run-item {
      border-bottom: 1px solid #0d1117;
      cursor: pointer;
      transition: background 0.15s;
    }

    .run-item:hover { background: rgba(255,255,255,0.02); }
    .run-item.active { background: rgba(0,201,255,0.04); border-left: 2px solid var(--accent); }

    .run-item-header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .run-item-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .run-id {
      font-size: 0.65rem;
      color: var(--muted);
      width: 28px;
    }

    .run-ts {
      font-size: 0.75rem;
      color: var(--text);
    }

    .run-badges {
      display: flex;
      gap: 8px;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    .badge-pass { background: rgba(0,255,136,0.1); color: var(--ok); border: 1px solid rgba(0,255,136,0.25); }
    .badge-fail { background: rgba(255,59,92,0.1); color: var(--error); border: 1px solid rgba(255,59,92,0.25); }
    .badge-lat  { background: rgba(0,201,255,0.1); color: var(--accent); border: 1px solid rgba(0,201,255,0.25); }

    .run-detail {
      display: none;
      padding: 0 20px 16px 20px;
    }

    .run-item.active .run-detail { display: block; }

    .json-block {
      background: #030508;
      padding: 16px;
      font-size: 0.72rem;
      line-height: 1.7;
      border: 1px solid #0d1520;
      overflow-x: auto;
      white-space: pre;
      color: #8b9dc3;
      max-height: 260px;
      overflow-y: auto;
    }

    /* JSON syntax highlight */
    .j-key { color: #79b8ff; }
    .j-str { color: #9ecbff; }
    .j-num { color: #f97583; }
    .j-bool { color: #ffab70; }
    .j-null { color: var(--muted); }

    /* Loading */
    #loadingState {
      padding: 48px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #emptyState {
      display: none;
      padding: 48px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    /* Copy toast */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      padding: 12px 24px;
      background: var(--panel);
      border: 1px solid var(--ok);
      color: var(--ok);
      font-size: 0.75rem;
      z-index: 200;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">JIKAN<span>/export</span></div>
  <nav class="nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/run-page">Run</a>
    <a href="/health">Health</a>
  </nav>
</header>

<main>

  <div class="hero">
    <div class="hero-label">// data export</div>
    <h1>EXPORT<br><span>JSON</span></h1>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-v" id="statTotal">—</div>
      <div class="stat-l">Runs exportés</div>
    </div>
    <div class="stat">
      <div class="stat-v" id="statPassed" style="color:var(--ok)">—</div>
      <div class="stat-l">Tests passés (total)</div>
    </div>
    <div class="stat">
      <div class="stat-v" id="statAvgLat" style="color:var(--warn)">—</div>
      <div class="stat-l">Latence moy. globale</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-dl" onclick="downloadJSON()">⬇ Télécharger JSON</button>
    <button class="btn btn-copy" onclick="copyJSON()">⎘ Copier tout</button>
    <button class="btn btn-refresh" onclick="loadData()">↻ Rafraîchir</button>
  </div>

  <div class="filters">
    <span class="filter-label">Filtrer :</span>
    <input class="search-input" id="searchInput" placeholder="Rechercher par date, statut..." oninput="filterRuns()"/>
    <select class="filter-select" id="limitSelect" onchange="loadData()">
      <option value="20">20 derniers</option>
      <option value="50">50 derniers</option>
      <option value="100" selected>100 derniers</option>
    </select>
  </div>

  <div class="json-panel">
    <div class="json-panel-header">
      <div class="json-panel-header-left">
        <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
        <div class="json-title">runs.json</div>
      </div>
      <div class="record-count"><span id="visibleCount">0</span> enregistrements</div>
    </div>
    <div class="runs-list" id="runsList">
      <div id="loadingState"><span class="spinner"></span>Chargement des données...</div>
      <div id="emptyState">Aucun run trouvé.</div>
    </div>
  </div>

</main>

<div class="toast" id="toast">✔ Copié dans le presse-papiers</div>

<script>
  let allData = [];
  let filtered = [];

  async function loadData() {
    const limit = document.getElementById('limitSelect').value;
    document.getElementById('loadingState').style.display = 'block';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('runsList').querySelectorAll('.run-item').forEach(e => e.remove());

    try {
      const res = await fetch(`/export`);
      allData = await res.json();
      filtered = [...allData];
      renderStats();
      filterRuns();
    } catch(e) {
      document.getElementById('loadingState').innerHTML = `<span style="color:var(--error)">✖ Erreur : ${e.message}</span>`;
    }
  }

  function renderStats() {
    document.getElementById('statTotal').textContent = allData.length;
    const totalPassed = allData.reduce((acc, r) => acc + (r.summary?.passed || 0), 0);
    document.getElementById('statPassed').textContent = totalPassed;
    const lats = allData.map(r => r.summary?.latency_ms_avg || 0).filter(v => v > 0);
    const avgLat = lats.length ? Math.round(lats.reduce((a,b) => a+b, 0) / lats.length) : 0;
    document.getElementById('statAvgLat').textContent = avgLat ? avgLat + 'ms' : '—';
  }

  function filterRuns() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    filtered = allData.filter(r => {
      if (!q) return true;
      return JSON.stringify(r).toLowerCase().includes(q);
    });
    renderRuns();
  }

  function renderRuns() {
    const list = document.getElementById('runsList');
    list.querySelectorAll('.run-item').forEach(e => e.remove());
    document.getElementById('loadingState').style.display = 'none';

    if (filtered.length === 0) {
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('visibleCount').textContent = 0;
      return;
    }

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('visibleCount').textContent = filtered.length;

    filtered.forEach((run, i) => {
      const s = run.summary || {};
      const ts = (run.timestamp || '').replace('T', ' ').slice(0, 19);
      const div = document.createElement('div');
      div.className = 'run-item';
      div.innerHTML = `
        <div class="run-item-header" onclick="toggleRun(this)">
          <div class="run-item-left">
            <span class="run-id">#${run.id || i+1}</span>
            <span class="run-ts">${ts}</span>
            <div class="run-badges">
              <span class="badge badge-pass">✔ ${s.passed ?? '—'}</span>
              ${(s.failed || 0) > 0 ? `<span class="badge badge-fail">✖ ${s.failed}</span>` : ''}
              <span class="badge badge-lat">${s.latency_ms_avg ? Math.round(s.latency_ms_avg) + 'ms' : '—'}</span>
            </div>
          </div>
          <span style="color:var(--muted);font-size:0.7rem">▼</span>
        </div>
        <div class="run-detail">
          <div class="json-block">${syntaxHighlight(JSON.stringify(run, null, 2))}</div>
        </div>
      `;
      list.appendChild(div);
    });
  }

  function toggleRun(header) {
    const item = header.closest('.run-item');
    const wasActive = item.classList.contains('active');
    document.querySelectorAll('.run-item.active').forEach(el => el.classList.remove('active'));
    if (!wasActive) item.classList.add('active');
  }

  function syntaxHighlight(json) {
    return json
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
        let cls = 'j-num';
        if (/^"/.test(match)) cls = /:$/.test(match) ? 'j-key' : 'j-str';
        else if (/true|false/.test(match)) cls = 'j-bool';
        else if (/null/.test(match)) cls = 'j-null';
        return `<span class="${cls}">${match}</span>`;
      });
  }

  function downloadJSON() {
    const blob = new Blob([JSON.stringify(filtered, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `jikan-runs-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  }

  function copyJSON() {
    navigator.clipboard.writeText(JSON.stringify(filtered, null, 2)).then(() => {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    });
  }

  loadData();
</script>

</body>
</html>
