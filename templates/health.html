<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Health — Jikan API</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#e0e0f0;min-height:100vh}
    header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px 32px;border-bottom:2px solid #7c3aed;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    header h1{font-size:1.4rem;color:#a78bfa}
    header span{font-size:0.82rem;color:#94a3b8}
    .nav-links-header{display:flex;gap:12px}
    .nav-links-header a{color:#a78bfa;text-decoration:none;font-size:.85rem;border:1px solid #4c1d95;padding:8px 16px;border-radius:8px;transition:background .2s}
    .nav-links-header a:hover{background:#1e1e30}
    .container{max-width:900px;margin:0 auto;padding:24px 20px}
    .section-title{font-size:1rem;color:#a78bfa;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #2d2d50}
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:28px}
    .kpi-card{background:#1e1e30;border:1px solid #2d2d50;border-radius:12px;padding:16px 18px;text-align:center}
    .kpi-card .value{font-size:1.9rem;font-weight:700;color:#a78bfa}
    .kpi-card .label{font-size:.75rem;color:#94a3b8;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
    .kpi-card.green .value{color:#34d399}
    .kpi-card.red .value{color:#f87171}
    .kpi-card.yellow .value{color:#fbbf24}
    .status-banner{border-radius:12px;padding:20px 24px;margin-bottom:28px;display:flex;align-items:center;gap:16px;font-size:1.1rem;font-weight:700}
    .status-banner.ok{background:#065f4622;border:1px solid #34d399;color:#34d399}
    .status-banner.degraded{background:#78350f22;border:1px solid #fbbf24;color:#fbbf24}
    .status-banner.error{background:#7f1d1d22;border:1px solid #f87171;color:#f87171}
    .pulse{width:14px;height:14px;border-radius:50%;flex-shrink:0}
    .pulse.ok{background:#34d399;box-shadow:0 0 10px #34d399}
    .pulse.degraded{background:#fbbf24;box-shadow:0 0 10px #fbbf24}
    .pulse.error{background:#f87171;box-shadow:0 0 10px #f87171}
    .terminal{background:#0a0a1a;border:1px solid #2d2d50;border-radius:10px;margin-bottom:28px;overflow:hidden}
    .terminal-header{background:#16213e;padding:10px 16px;display:flex;align-items:center;gap:8px}
    .dot{width:10px;height:10px;border-radius:50%}
    .dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
    .terminal-title{font-size:.75rem;color:#64748b;margin-left:8px;font-family:monospace}
    .terminal-body{padding:16px;font-family:monospace;font-size:.78rem;line-height:1.9;min-height:80px}
    .log{display:flex;gap:12px}
    .log-t{color:#475569;flex-shrink:0}
    .log-m.ok{color:#34d399}.log-m.warn{color:#fbbf24}.log-m.err{color:#f87171}.log-m.dim{color:#475569}.log-m.accent{color:#a78bfa}
    .cursor{display:inline-block;width:7px;height:13px;background:#34d399;animation:blink 1s step-end infinite;vertical-align:middle}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    .links{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}
    .links a{color:#a78bfa;text-decoration:none;font-size:.83rem;border:1px solid #4c1d95;padding:6px 14px;border-radius:6px;transition:background .2s}
    .links a:hover{background:#1e1e30}
  </style>
</head>
<body>
<header>
  <div>
    <h1>❤️ Health Check</h1>
    <span>API : https://api.jikan.moe/v4 &nbsp;·&nbsp; Hunter x Hunter (MAL id 11061)</span>
  </div>
  <div class="nav-links-header">
    <a href="/dashboard">Dashboard</a>
    <a href="/run-page">Run</a>
    <a href="/export-page">Export</a>
  </div>
</header>

<div class="container">

  <div class="status-banner ok" id="statusBanner">
    <div class="pulse ok" id="pulseDot"></div>
    <span id="statusText">Chargement...</span>
  </div>

  <div class="section-title">📊 Métriques</div>
  <div class="kpi-grid">
    <div class="kpi-card green"><div class="value" id="kpiAvail">—</div><div class="label">Disponibilité</div></div>
    <div class="kpi-card"><div class="value" id="kpiDb" style="color:#a78bfa">—</div><div class="label">Base de données</div></div>
    <div class="kpi-card"><div class="value" id="kpiApi" style="color:#a78bfa;font-size:1.1rem">—</div><div class="label">API surveillée</div></div>
  </div>

  <div class="section-title">🖥️ Logs</div>
  <div class="terminal">
    <div class="terminal-header">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      <div class="terminal-title">health.log</div>
    </div>
    <div class="terminal-body" id="termBody">
      <div class="log"><span class="log-t" id="initTime"></span><span class="log-m dim">Connexion au endpoint /health... <span class="cursor"></span></span></div>
    </div>
  </div>

  <div class="links">
    <a href="/run-page">▶ Lancer un run</a>
    <a href="/dashboard">📊 Dashboard</a>
    <a href="/export-page">⬇ Export JSON</a>
  </div>

</div>

<script>
  document.getElementById('initTime').textContent = new Date().toLocaleTimeString('fr-FR');
  function t() { return new Date().toLocaleTimeString('fr-FR'); }
  function addLog(msg, cls='') {
    const body = document.getElementById('termBody');
    const idle = body.querySelector('.log-m.dim');
    if (idle) idle.closest('.log')?.remove();
    const div = document.createElement('div');
    div.className = 'log';
    div.innerHTML = `<span class="log-t">${t()}</span><span class="log-m ${cls}">${msg}</span>`;
    body.appendChild(div);
  }

  async function loadHealth() {
    try {
      const res = await fetch('/health', { headers: { 'Accept': 'application/json' } });
      const data = await res.json();
      const status = data.status || 'ok';
      const banner = document.getElementById('statusBanner');
      const dot = document.getElementById('pulseDot');
      const txt = document.getElementById('statusText');

      if (status === 'ok') {
        banner.className = 'status-banner ok';
        dot.className = 'pulse ok';
        txt.textContent = '✔ OPERATIONAL — Tous les systèmes fonctionnent normalement';
        addLog('✔ Statut : OPERATIONAL', 'ok');
      } else if (status === 'degraded') {
        banner.className = 'status-banner degraded';
        dot.className = 'pulse degraded';
        txt.textContent = '⚠ DEGRADED — Performance réduite détectée';
        addLog('⚠ Statut : DEGRADED', 'warn');
      } else {
        banner.className = 'status-banner error';
        dot.className = 'pulse error';
        txt.textContent = '✖ INCIDENT — Problème détecté';
        addLog('✖ Statut : INCIDENT', 'err');
      }

      addLog(data.message || '—', 'dim');

      const availMatch = (data.message || '').match(/disponibilité=([\d.]+)%/);
      if (availMatch) {
        const v = parseFloat(availMatch[1]);
        document.getElementById('kpiAvail').textContent = v + '%';
        document.getElementById('kpiAvail').parentElement.className = 'kpi-card ' + (v >= 90 ? 'green' : 'yellow');
      } else {
        document.getElementById('kpiAvail').textContent = '—';
      }
      document.getElementById('kpiDb').textContent = (data.db || 'sqlite').toUpperCase();
      document.getElementById('kpiApi').textContent = data.api || '—';
      addLog('Réponse reçue.', 'dim');

    } catch(e) {
      document.getElementById('statusBanner').className = 'status-banner error';
      document.getElementById('statusText').textContent = '✖ UNREACHABLE';
      addLog('✖ Erreur : ' + e.message, 'err');
    }
  }
  loadHealth();
</script>
</body>
</html>
